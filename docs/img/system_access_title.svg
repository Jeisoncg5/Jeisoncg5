<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="100%" height="120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 26px monospace;
        fill: #ffffff;
        letter-spacing: 5px;
      }
      .sub {
        font: 400 12px monospace;
        fill: #808080;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- lines -->
  <line x1="0" y1="60" x2="420" y2="60" stroke="#333333" stroke-width="1"/>
  <line x1="580" y1="60" x2="1000" y2="60" stroke="#333333" stroke-width="1"/>

  <!-- center node -->
  <g transform="translate(500,60)" filter="url(#glow)">
    <circle r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <circle r="5" fill="#ffffff"/>
  </g>

  <!-- text -->
  <text x="500" y="40" text-anchor="middle" class="title">SYSTEM ACCESS</text>
  <text x="500" y="95" text-anchor="middle" class="sub">entry points • external systems • interfaces</text>
</svg>
