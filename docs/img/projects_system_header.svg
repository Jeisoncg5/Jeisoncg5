<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="320">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="coreGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 36px 'Segoe UI', Arial, sans-serif;
        fill: #ffffff;
        letter-spacing: 5px;
      }
      .subtitle {
        font: 500 14px 'Segoe UI', Arial, sans-serif;
        fill: #808080;
        letter-spacing: 2px;
      }
      .system {
        font: 600 12px 'Segoe UI', Arial, sans-serif;
        fill: #ffffff;
        letter-spacing: 2px;
        opacity: 0.6;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Central core -->
  <g transform="translate(600 150)">
    <circle r="70" fill="url(#coreGrad)" filter="url(#glow)">
      <animate attributeName="r" values="65;75;65" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Side lines -->
  <line x1="80" y1="150" x2="480" y2="150" stroke="#333333" stroke-width="1"/>
  <line x1="720" y1="150" x2="1120" y2="150" stroke="#333333" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" class="title">PROJECT SYSTEMS</text>

  <!-- Subtitle -->
  <text x="600" y="265" text-anchor="middle" class="subtitle">BACKEND SYSTEMS • INFRASTRUCTURE • ARCHITECTURES</text>

  <!-- System label -->
  <text x="600" y="40" text-anchor="middle" class="system">SYSTEM ACCESS: PROJECT MODULES</text>
</svg>
