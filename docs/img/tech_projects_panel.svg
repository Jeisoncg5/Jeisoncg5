<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="coreGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>

    <style>
      .title {
        font: 700 36px 'Segoe UI', Arial;
        fill: #ffffff;
        letter-spacing: 3px;
      }
      .subtitle {
        font: 500 16px 'Segoe UI', Arial;
        fill: #808080;
      }
      .cta {
        font: 600 14px 'Segoe UI', Arial;
        fill: #ffffff;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="500" height="650" fill="url(#bg)"/>

  <!-- core -->
  <g transform="translate(250,260)">
    <circle r="110" fill="url(#coreGrad)" filter="url(#glow)">
      <animate attributeName="r" values="105;115;105" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- lines -->
  <line x1="40" y1="260" x2="160" y2="260" stroke="#333333" stroke-width="2"/>
  <line x1="340" y1="260" x2="460" y2="260" stroke="#333333" stroke-width="2"/>

  <!-- text -->
  <text x="250" y="430" text-anchor="middle" class="title">PROJECTS</text>
  <text x="250" y="470" text-anchor="middle" class="subtitle">systems • experiments • code</text>
  <text x="250" y="520" text-anchor="middle" class="cta">ENTER →</text>
</svg>
